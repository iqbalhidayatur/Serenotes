<body>
    
    <header class="d-flex justify-content-between align-items-center">

        <div class="d-flex align-items-center gap-3">

            <div>
                <h3 class="m-0">Home</h3>
                <p id="headerGreeting" class="m-0 text-secondary" style="font-size:.82rem;line-height:1.4;"></p>
            </div>

        </div>

        <a
            href="search.html"
            class="text-decoration-none"
        >

            <i class="bi bi-search fs-4"></i>

        </a>

    </header>

    <main class="p-2">

        <!-- Overlay -->
        <div class="overlay" id="filterOverlay"></div>

        <!-- Filter Popup -->
        <div class="filter-popup" id="filterPopup">

            <div class="filter-header">
                <h5>Filter Notes</h5>
                <button id="closeFilter">
                    <i class="bi bi-x-lg"></i>
                </button>
            </div>

            <div class="filter-body">

                <div class="filter-group">
                    <label>From Date</label>
                    <input type="date" id="filterStartDate">
                </div>

                <div class="filter-group">
                    <label>To Date</label>
                    <input type="date" id="filterEndDate">
                </div>

                <div class="filter-group">
                    <label>Folder</label>
                    <select id="filterFolder">
                        <option value="">All Folders</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>Tag</label>
                    <select id="filterTag">
                        <option value="">All Tags</option>
                    </select>
                </div>

            </div>

            <div class="filter-footer">
                <button class="btn-reset" id="resetFilter">
                    Reset
                </button>

                <button class="btn-apply" id="applyFilter">
                    Apply Filter
                </button>
            </div>

        </div>

        <div class="recent pt-3 d-flex flex-column justify-content-space-between align-items-center w-100">
            
            <div class="w-100 d-flex justify-content-start align-items-center">
                <h1 class="w-100">Recent Notes</h1>
            </div>
            <div class="btn-container d-flex justify-content-end align-items-center w-100 gap-2">

                <div class="filter">
                    <button class="btn-filter" id="btnFilter">
                        <i class="bi bi-filter"></i>
                    </button>            
                </div>

            </div>
        </div>

        <div class="notes-card">

            <div class="recent-slider" id="recentContainer"></div>

            <div class="all-notes pt-4">

                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h1>All Notes</h1>
                </div>

                <div id="notesContainer" class="p-2"></div>

            </div>

        </div>

    </main>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item active">
            <i class="bi bi-house-fill"></i>
        </a>

        <a href="hub.html" class="nav-item">
            <i class="bi bi-grid-fill"></i>
        </a>

        <a class="nav-item add-note" id="btnAddNote">
            <i class="bi bi-plus-circle-fill"></i>
        </a>

        <a href="category.html" class="nav-item">
            <i class="bi bi-list-ul"></i>
        </a>
        
        <a href="settings.html" class="nav-item">
            <i class="bi bi-gear-fill"></i>
        </a>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>


    <!-- ── Quick Note Popup ──────────────────────────── -->
    <div class="overlay" id="quickNoteOverlay"></div>
    <div class="quick-note-popup" id="quickNotePopup">
        <div class="quick-note-handle"></div>
        <p class="quick-note-label">Buat Catatan</p>
        <div class="quick-note-options">
            <button class="quick-note-option" id="btnQuickEmpty">
                <span class="quick-note-icon"><i class="bi bi-file-earmark-plus"></i></span>
                <span class="quick-note-text">
                    <strong>Note Kosong</strong>
                    <small>Langsung tulis tanpa isi form</small>
                </span>
            </button>
            <button class="quick-note-option" id="btnQuickForm">
                <span class="quick-note-icon"><i class="bi bi-ui-checks-grid"></i></span>
                <span class="quick-note-text">
                    <strong>Gunakan Form</strong>
                    <small>Isi judul, kategori, dan detail</small>
                </span>
            </button>
        </div>
    </div>
</body>
</html>
