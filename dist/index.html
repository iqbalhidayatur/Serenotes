<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script>
        // Cek apakah sudah login (ada token + user)
        const token  = localStorage.getItem("sn_access_token");
        const expiry = parseInt(localStorage.getItem("sn_token_expiry") || "0");
        const user   = localStorage.getItem("sn_user");
        const valid  = token && user && Date.now() < expiry - 60000;

        if (valid) {
            window.location.replace("dashboard.html");
        } else {
            window.location.replace("login.html");
        }
    </script>
</head>
<body></body>
</html>
