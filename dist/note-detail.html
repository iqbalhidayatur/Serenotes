<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <script>
        const t = localStorage.getItem("serenotes_theme") || "light";
        document.documentElement.setAttribute("data-theme", t);
    </script>

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Serenotes</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">


    <meta name="theme-color" content="#4F46E5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Serenotes">
    <link rel="manifest" href="/assets/manifest-BlLKieyn.json">
    <link rel="apple-touch-icon" href="/assets/icon-192-6w8mqElR.png">
    <link rel="icon" type="image/png" href="/assets/icon-192-6w8mqElR.png">
  <script type="module" crossorigin src="/assets/noteDetail-DeaJ37pZ.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-B5Qt9EMX.js">
  <link rel="modulepreload" crossorigin href="/assets/preload-helper-CWvZBRxe.js">
  <link rel="modulepreload" crossorigin href="/assets/themeService-BgIb2Nl3.js">
  <link rel="modulepreload" crossorigin href="/assets/locationService-C-vaanNi.js">
  <link rel="modulepreload" crossorigin href="/assets/noteService-BbxFfomM.js">
  <link rel="modulepreload" crossorigin href="/assets/mediaService-BqUZfek5.js">
  <link rel="modulepreload" crossorigin href="/assets/folderService-D-ma_eOi.js">
  <link rel="stylesheet" crossorigin href="/assets/preload-helper-vtb1SolZ.css">
</head>

<body>

<header class="detail-header">

    <button id="backBtn" class="header-btn" onclick="window.history.back()">
            <i class="bi bi-arrow-left"></i>
        </button>

    <div class="header-actions">

        <div class="tag-header-wrap">
            <button id="tagHeaderBtn" class="header-btn" title="Tags">
                <i class="bi bi-tags"></i>
            </button>
            <div id="tagDropdown" class="tag-dropdown">
                <div class="tags-wrap mb-2" id="tagsContainer"></div>
                <div class="tag-add-row d-flex justify-content-center align-items-center gap-2">
                    <input type="text" id="tagAddInput" class="tag-add-input" placeholder="Add tag...">
                    <button id="tagAddBtn" class="tag-add-btn btn btn-primary d-flex justify-content-center align-items-center">
                        <i class="bi bi-plus-lg"></i>
                    </button>
                </div>
            </div>
        </div>

        <button
            id="viewModeBtn"
            class="header-btn"
            title="Toggle view mode"
        >
            <i class="bi bi-eye"></i>
        </button>

        <button
            id="editBtn"
            class="header-btn d-none"
        >
            <i class="bi bi-pencil-square"></i>
        </button>

        <button
            id="shareBtn"
            class="header-btn"
        >
            <i class="bi bi-share"></i>
        </button>

    </div>

</header>

<main class="container py-4">

    <!-- Badge -->

    <div class="d-flex align-items-center gap-2 mb-4">

        <span
            id="categoryBadge"
            class="badge rounded-pill text-dark bg-light border px-3 py-2"
        >
            Work
        </span>

    </div>

    <!-- Note Name (acts as a collapsible heading for the whole note body) -->
    <div id="titleRow" class="title-row d-flex align-items-start">
        <span
            id="titleToggle"
            class="heading-toggle title-toggle"
            title="Collapse/expand this note"
        >
            <i class="bi bi-chevron-down"></i>
        </span>
        <p id="noteNameDisplay" class="note-name text-secondary mb-1" contenteditable="true" spellcheck="false" data-placeholder="Untitled"></p>
    </div>

    <!-- Everything below the title collapses when the title toggle is closed -->
    <div id="noteBodyWrap">

    <!-- Date & Reminder -->

    <div
        class="d-flex align-items-center flex-wrap gap-2 note-meta mb-4"
    >

        <div class="d-flex align-items-center gap-2">

            <i class="bi bi-calendar3"></i>

            <span id="noteDate">
                Oct 24, 2023
            </span>

        </div>

        <div
            id="locationMetaWrap"
            class="d-flex align-items-center gap-2 d-none"
        >

            <span class="text-secondary">•</span>

            <i class="bi bi-geo-alt"></i>

            <span id="noteLocation"></span>

        </div>

        <span class="mx-1 text-secondary">
            •
        </span>

        <div
            id="reminderStatus"
            class="d-flex align-items-center gap-2 text-primary"
        >

        </div>

    </div>

    <!-- Note Content -->

    <div
        id="editor"
        class="note-editor">
    </div>

    <!-- Media -->
    <section id="mediaSection" class="mt-5 d-none">
        <h6 class="fw-semibold mb-3">
            <i class="bi bi-paperclip me-2"></i>Attachments
        </h6>
        <div id="mediaContainer"></div>
    </section>

    <!-- Reminder -->
    <section id="reminderSection" class="mt-4">
        <div id="reminderContainer"></div>
    </section>

    <section id="noteFoldersSection" class="mt-5">

        <div class="d-flex justify-content-between align-items-center mb-3">

            <h5 class="mb-0">Sub-pages</h5>

            <div class="d-flex gap-2 sub-pages">

                <button
                    id="btnAddNoteInNote"
                    class="btn btn-outline-primary rounded-pill">
                    <i class="bi bi-file-earmark-plus"></i>
                </button>

                <button
                    id="btnAddFolderInNote"
                    class="btn btn-primary rounded-pill">
                    <i class="bi bi-folder-plus"></i>
                </button>

            </div>

        </div>

        <div id="noteFoldersList"></div>

    </section>

    </div>
    <!-- /#noteBodyWrap -->

</main>

<nav class="bottom-nav">

    <a
        href="dashboard.html"
        class="nav-item active"
    >
        <i class="bi bi-house-fill"></i>
    </a>

    <a href="hub.html" class="nav-item">
        <i class="bi bi-grid-fill"></i>
    </a>

    <a
        href="category.html"
        class="nav-item"
    >
        <i class="bi bi-list-ul"></i>
    </a>

    <a
        href="settings.html"
        class="nav-item"
    >
        <i class="bi bi-gear-fill"></i>
    </a>

</nav>

<div id="editorToolbar" class="editor-toolbar">

    <button data-command="bold" title="Bold">
        <i class="bi bi-type-bold"></i>
    </button>

    <button data-command="italic" title="Italic">
        <i class="bi bi-type-italic"></i>
    </button>

    <button data-command="underline" title="Underline">
        <i class="bi bi-type-underline"></i>
    </button>

    <button data-command="strikethrough" title="Strikethrough">
        <i class="bi bi-type-strikethrough"></i>
    </button>

    <div class="toolbar-divider"></div>

    <button data-command="fontSize" data-dropdown title="Ukuran teks">
        <i class="bi bi-text-paragraph"></i>
    </button>

    <button data-command="fontFamily" data-dropdown title="Font">
        <i class="bi bi-fonts"></i>
    </button>

    <div class="toolbar-divider"></div>

    <button data-heading="heading1" title="Heading 1">H1</button>
    <button data-heading="heading2" title="Heading 2">H2</button>
    <button data-heading="heading3" title="Heading 3">H3</button>

    <div class="toolbar-divider"></div>

    <button id="toolbarAttachBtn" title="Lampiran">
        <i class="bi bi-paperclip"></i>
    </button>

</div>

<input type="file" id="mediaFileInput" multiple accept="image/*,video/*,audio/*" style="display:none">

<div id="slashMenu" class="slash-menu">

    <button data-type="paragraph">
        Paragraph
    </button>

    <button data-type="heading1">
        Heading 1
    </button>

    <button data-type="heading2">
        Heading 2
    </button>

    <button data-type="heading3">
        Heading 3
    </button>

    <button data-type="quote">
        Quote
    </button>

    <button data-type="todo">
        Checklist
    </button>

    <button data-type="media">
        Attachment
    </button>

    <button data-type="note-link">
        <i class="bi bi-file-earmark-text"></i> Note
    </button>

</div>


<!-- ── Media Preview Lightbox ──────────────────────── -->
<div id="mediaLightbox" class="media-lightbox" role="dialog" aria-modal="true" aria-label="Media preview">
    <div class="media-lightbox-backdrop"></div>

    <div class="media-lightbox-header">
        <span class="media-lightbox-title" id="lightboxTitle"></span>
        <div class="media-lightbox-actions">
            <span class="media-lightbox-counter" id="lightboxCounter"></span>
            <a class="media-lightbox-download" id="lightboxDownload" download title="Download">
                <i class="bi bi-download"></i>
            </a>
            <button class="media-lightbox-close" id="lightboxClose" title="Tutup">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>
    </div>

    <div class="media-lightbox-body" id="lightboxBody"></div>

    <button class="media-lightbox-nav prev" id="lightboxPrev">
        <i class="bi bi-chevron-left"></i>
    </button>
    <button class="media-lightbox-nav next" id="lightboxNext">
        <i class="bi bi-chevron-right"></i>
    </button>

    <div class="media-lightbox-dots" id="lightboxDots"></div>
</div>

</body>

</html>
