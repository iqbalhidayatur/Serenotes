<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>
        const t = localStorage.getItem("serenotes_theme") || "light";
        document.documentElement.setAttribute("data-theme", t);
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Note | Serenotes</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <meta name="theme-color" content="#4F46E5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Serenotes">

    <link rel="apple-touch-icon" href="/assets/icon-192-6w8mqElR.png">
    <link rel="icon" type="image/png" href="/assets/icon-192-6w8mqElR.png">
  <script type="module" crossorigin src="/assets/addNote-BMjPe6D5.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-B5Qt9EMX.js">
  <link rel="modulepreload" crossorigin href="/assets/preload-helper-D33vDyUH.js">
  <link rel="modulepreload" crossorigin href="/assets/themeService-BgIb2Nl3.js">
  <link rel="modulepreload" crossorigin href="/assets/syncService-BQUdfgLS.js">
  <link rel="modulepreload" crossorigin href="/assets/noteService-DbdrNuO8.js">
  <link rel="modulepreload" crossorigin href="/assets/folderService-CcR8-Orv.js">
  <link rel="modulepreload" crossorigin href="/assets/locationService-C-vaanNi.js">
  <link rel="modulepreload" crossorigin href="/assets/notificationService-DwiMN6DO.js">
  <link rel="stylesheet" crossorigin href="/assets/preload-helper-DCz1ez8R.css">
</head>
<body>

<header class="d-flex justify-content-between align-items-center p-3">

    <div class="d-flex align-items-center gap-3">
        <button id="backBtn" class="header-btn" onclick="window.history.back()">
            <i class="bi bi-arrow-left"></i>
        </button>

        <h3 class="m-0 text-dark fw-semibold" id="pageTitle">
            Add Note
        </h3>
    </div>

    <button
        id="headerSaveBtn"
        type="submit"
        form="noteForm"
        class="btn btn-link"
    >
        Save
    </button>

</header>

<main class="container py-4">

    <form id="noteForm">

        <div class="mb-4">

            <label class="form-label">
                Folder
            </label>

            <button
                type="button"
                id="folderPickerBtn"
                class="btn btn-outline-secondary rounded-4 p-3 w-100 d-flex justify-content-between align-items-center"
            >

                <span id="folderPickerLabel">
                    <i class="bi bi-file-earmark me-2"></i>No Folder
                </span>

                <i class="bi bi-chevron-right"></i>

            </button>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Note Name
            </label>

            <div class="d-flex gap-2">

                <select
                    id="noteSelect"
                    class="form-select d-none">
                </select>

                <input
                    type="text"
                    id="noteName"
                    class="form-control"
                    placeholder="Enter note name">

                <button
                    type="button"
                    id="btnNewNote"
                    class="btn btn-outline-primary d-none">

                    + New

                </button>

            </div>

            <button
                type="button"
                id="btnCancelNewNote"
                class="btn btn-link p-0 mt-2 d-none">

                Cancel

            </button>

        </div>

        <div class="mb-4">

            <label class="form-label">
                Date
            </label>

            <input
                type="datetime-local"
                id="noteDate"
                class="form-control rounded-4 p-3"
            >

        </div>

        <div class="mb-4">

            <label class="form-label">
                Title
            </label>

            <input
                id="title"
                type="text"
                class="form-control rounded-4 p-3"
                placeholder="Title..."
            >

        </div>

        <div class="mb-4">

            <label class="form-label">
                Notes
            </label>

            <textarea
                id="content"
                class="form-control rounded-4 p-3"
                rows="8"
                placeholder="Write your note here..."
            ></textarea>

        </div>

        <div class="mb-4">

    <label class="form-label">
        Attachments
    </label>

    <label
        for="attachment"
        class="attachment-upload"
    >

        <i class="bi bi-paperclip"></i>

        <span>

            Add Photo, Video, GIF or Voice Note

        </span>

    </label>

    <input
        id="attachment"
        type="file"
        class="d-none"
        multiple
        accept="
            image/*,
            video/*,
            audio/*,
            .gif
        "
    >

    <div
        id="attachmentPreview"
        class="attachment-preview-list mt-3"
    ></div>

</div>

        <div class="mb-4">

            <div class="d-flex justify-content-between align-items-center">

                <div class="d-flex align-items-center gap-2">

                    <i class="bi bi-bell"></i>

                    <span>

                        Remind Me

                    </span>

                </div>

                <div class="form-check form-switch">

                    <input
                        id="reminderSwitch"
                        class="form-check-input"
                        type="checkbox"
                    >

                </div>

            </div>

        </div>

        <div
            id="reminderFields"
            class="d-none mb-4"
        >

            <label class="form-label">

                Reminder Date & Time

            </label>

            <input

                id="reminderDate"

                type="datetime-local"

                class="form-control rounded-4 p-3"

            >

        </div>

        <button
            id="bottomSaveBtn"
            type="submit"
            class="btn btn-primary w-100 rounded-4 py-3 fw-semibold"
        >
            Save Note
        </button>

    </form>

</main>

<div class="modal fade" id="folderPickerModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-scrollable">
        <div class="modal-content rounded-4">

            <div class="modal-header">

                <h5 class="modal-title">
                    Choose Folder
                </h5>

                <button
                    type="button"
                    class="btn-close"
                    data-bs-dismiss="modal"
                ></button>

            </div>

            <div class="modal-body">

                <nav aria-label="breadcrumb">
                    <ol
                        class="breadcrumb flex-wrap"
                        id="folderBreadcrumb"
                    ></ol>
                </nav>

                <button
                    type="button"
                    id="chooseNoFolderBtn"
                    class="btn btn-sm btn-outline-secondary w-100 rounded-4 mb-3"
                >
                    <i class="bi bi-file-earmark"></i>
                    Save without folder
                </button>

                <div
                    id="folderPickerList"
                    class="folder-picker-list d-flex flex-column gap-2"
                ></div>

                <div class="input-group mt-3">

                    <input
                        type="text"
                        id="newFolderInline"
                        class="form-control rounded-start-4"
                        placeholder="New folder name..."
                    >

                    <button
                        type="button"
                        id="newFolderInlineBtn"
                        class="btn btn-primary rounded-end-4"
                    >
                        <i class="bi bi-plus-lg"></i>
                    </button>

                </div>

            </div>

            <div class="modal-footer">

                <button
                    type="button"
                    id="chooseThisFolderBtn"
                    class="btn btn-primary rounded-4 w-100"
                >
                    Save In This Folder
                </button>

            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
