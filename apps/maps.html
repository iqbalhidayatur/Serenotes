<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>
        const t = localStorage.getItem("serenotes_theme") || "light";
        document.documentElement.setAttribute("data-theme", t);
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#4F46E5">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Hub | Serenotes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
    <link rel="stylesheet" href="style/app.css">
</head>
<body>

<header>
    <div>
        <h3 class="m-0">Maps</h3>
        <p class="m-0 text-secondary" style="font-size:.82rem;">Your maps to see notes by location</p>
    </div>
</header>

<main class="container py-4">
    <div class="maps-container">
        <div id="map"></div>
    </div>
</main>

<nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item">
            <i class="bi bi-house-fill"></i>
        </a>

        <a href="hub.html" class="nav-item active">
            <i class="bi bi-grid-fill"></i>
        </a>

        <a class="nav-item add-note" id="btnAddNote">
            <i class="bi bi-plus-circle-fill"></i>
        </a>

        <a href="category.html" class="nav-item">
            <i class="bi bi-list-ul"></i>
        </a>
        
        <a href="settings.html" class="nav-item">
            <i class="bi bi-gear-fill"></i>
        </a>
    </nav>


    <!-- ── Quick Note Popup ──────────────────────────── -->
    <div class="overlay" id="quickNoteOverlay"></div>
    <div class="quick-note-popup" id="quickNotePopup">
        <div class="quick-note-handle"></div>
        <p class="quick-note-label">Buat Catatan</p>
        <div class="quick-note-options">
            <button class="quick-note-option" id="btnQuickEmpty">
                <span class="quick-note-icon"><i class="bi bi-file-earmark-plus"></i></span>
                <span class="quick-note-text">
                    <strong>Note Kosong</strong>
                    <small>Langsung tulis tanpa isi form</small>
                </span>
            </button>
            <button class="quick-note-option" id="btnQuickForm">
                <span class="quick-note-icon"><i class="bi bi-ui-checks-grid"></i></span>
                <span class="quick-note-text">
                    <strong>Gunakan Form</strong>
                    <small>Isi judul, kategori, dan detail</small>
                </span>
            </button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>
    <script type="module" src="/js/pages/maps.js"></script>
    <script type="module" src="js/pages/quickNote.js"></script>
</body>
</html>
