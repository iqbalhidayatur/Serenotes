<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <script>
        const t = localStorage.getItem("serenotes_theme") || "light";
        document.documentElement.setAttribute("data-theme", t);
    </script>

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Serenotes</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="style/app.css">

    <meta name="theme-color" content="#4F46E5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Serenotes">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="style/assets/icon-192.png">
    <link rel="icon" type="image/png" href="style/assets/icon-192.png">
</head>

<body>

<header class="detail-header">

    <a
        href="dashboard.html"
        class="header-btn"
    >
        <i class="bi bi-arrow-left"></i>
    </a>

    <div class="header-actions">

        <button
            id="editBtn"
            class="header-btn"
        >
            <i class="bi bi-pencil-square"></i>
        </button>

        <button
            id="deleteBtn"
            class="header-btn"
        >
            <i class="bi bi-trash3"></i>
        </button>

        <button
            id="shareBtn"
            class="header-btn"
        >
            <i class="bi bi-share"></i>
        </button>

    </div>

</header>

<main class="container py-4">

    <!-- Badge -->

    <div class="d-flex align-items-center gap-2 mb-4">

        <span
            id="priorityBadge"
            class="badge rounded-pill bg-primary px-3 py-2"
        >
            <i class="bi bi-star-fill me-1"></i>
            Important
        </span>

        <span
            id="categoryBadge"
            class="badge rounded-pill text-dark bg-light border px-3 py-2"
        >
            Work
        </span>

    </div>

    <!-- Title -->

    <h1
        id="noteTitle"
        class="note-title mb-3"
    >
        Q4 Product Roadmap & Team Tasks
    </h1>

    <!-- Date & Reminder -->

    <div
        class="d-flex align-items-center flex-wrap gap-2 note-meta mb-4"
    >

        <div class="d-flex align-items-center gap-2">

            <i class="bi bi-calendar3"></i>

            <span id="noteDate">
                Oct 24, 2023
            </span>

        </div>

        <span class="mx-1 text-secondary">
            •
        </span>

        <div
            id="reminderStatus"
            class="d-flex align-items-center gap-2 text-primary"
        >

            <i class="bi bi-bell-fill"></i>

            <span>
                Reminder Active
            </span>

        </div>

    </div>

    <!-- Voice Note -->

    <div
        id="voiceCard"
        class="voice-player rounded-4 p-3 mb-4"
    >

        <div class="d-flex align-items-center">

            <button
                class="voice-play-btn"
                id="playVoiceBtn"
            >

                <i class="bi bi-play-fill"></i>

            </button>

            <div class="voice-wave mx-3">

                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>

            </div>

            <span
                id="voiceDuration"
                class="ms-auto"
            >
                00:00
            </span>

        </div>

    </div>

    <!-- Note Content -->

    <div
        id="noteContent"
        class="note-detail-content mb-5"
    >
    </div>

    <!-- Checklist -->

    <div
        id="checklistSection"
        class="mb-5"
    >

        <div class="detail-section-title">
            Checklist
        </div>

        <div id="checklistContainer">
        </div>

    </div>

    <!-- Reminder -->

    <div
        id="reminderSection"
        class="mb-5"
    >

        <div class="detail-section-title">
            Reminder
        </div>

        <div id="reminderContainer">
        </div>

    </div>

    <!-- Attachment -->

    <div
        id="mediaSection"
        class="mb-5"
    >

        <div class="detail-section-title">
            Attachments
        </div>

        <div id="mediaContainer">
        </div>

    </div>

</main>

<a
    href="#"
    id="floatingEdit"
    class="floating-edit"
>
    <i class="bi bi-pencil-fill"></i>
</a>

<nav class="bottom-nav">

    <a
        href="dashboard.html"
        class="nav-item active"
    >
        <i class="bi bi-house-fill"></i>
    </a>

    <a href="hub.html" class="nav-item">
        <i class="bi bi-grid-fill"></i>
    </a>

    <a
        href="category.html"
        class="nav-item"
    >
        <i class="bi bi-list-ul"></i>
    </a>

    <a
        href="settings.html"
        class="nav-item"
    >
        <i class="bi bi-gear-fill"></i>
    </a>

</nav>

<script
    type="module"
    src="js/pages/note-detail.js"
></script>

</body>

</html>
