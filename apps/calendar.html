<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <script>
        const t = localStorage.getItem("serenotes_theme") || "light";
        document.documentElement.setAttribute("data-theme", t);
    </script>

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Calendar | Serenotes</title>

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com"
    >

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    >

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    >

    <link
        rel="stylesheet"
        href="style/app.css"
    >

    <meta name="theme-color" content="#4F46E5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Serenotes">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="style/assets/icon-192.png">
    <link rel="icon" type="image/png" href="style/assets/icon-192.png">
</head>

<body>

<header class="d-flex justify-content-between align-items-center">

    <button id="backBtn" class="header-btn" onclick="window.history.back()">
        <i class="bi bi-arrow-left"></i>
    </button>

    <div class="d-flex align-items-center gap-3">

        <h3 class="m-0">

            Calendar

        </h3>

    </div>

    <a
        href="search.html"
        class="text-decoration-none pe-2"
    >

        <i class="bi bi-search fs-4"></i>

    </a>

</header>

<main class="container py-4">

    <div
        class="d-flex justify-content-between align-items-center mb-4"
    >

        <h2
            id="monthTitle"
            class="fw-bold m-0"
        >

            June 2026

        </h2>

        <div class="d-flex gap-2">

            <button
                id="prevMonth"
                class="btn btn-light rounded-circle"
            >

                <i class="bi bi-chevron-left"></i>

            </button>

            <button
                id="nextMonth"
                class="btn btn-light rounded-circle"
            >

                <i class="bi bi-chevron-right"></i>

            </button>

        </div>

    </div>

    <div class="calendar-card">

        <div
            class="calendar-header"
            id="weekDays"
        >

            <span>S</span>
            <span>M</span>
            <span>T</span>
            <span>W</span>
            <span>T</span>
            <span>F</span>
            <span>S</span>

        </div>

        <div
            id="calendarGrid"
            class="calendar-grid"
        >

        </div>

    </div>

    <section class="mt-5">

        <h3
            class="section-title"
            id="selectedDateTitle"
        >

            Notes

        </h3>

        <div
            id="notesByDate"
            class="mt-4"
        >

        </div>

    </section>

</main>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item">
            <i class="bi bi-house-fill"></i>
        </a>

        <a href="hub.html" class="nav-item active">
            <i class="bi bi-grid-fill"></i>
        </a>

        <a class="nav-item add-note" id="btnAddNote">
            <i class="bi bi-plus-circle-fill"></i>
        </a>

        <a href="category.html" class="nav-item">
            <i class="bi bi-list-ul"></i>
        </a>
        
        <a href="settings.html" class="nav-item">
            <i class="bi bi-gear-fill"></i>
        </a>
    </nav>

<script
    type="module"
    src="js/pages/calendar.js"
></script>

<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>


    <!-- ── Quick Note Popup ──────────────────────────── -->
    <div class="overlay" id="quickNoteOverlay"></div>
    <div class="quick-note-popup" id="quickNotePopup">
        <div class="quick-note-handle"></div>
        <p class="quick-note-label">Buat Catatan</p>
        <div class="quick-note-options">
            <button class="quick-note-option" id="btnQuickEmpty">
                <span class="quick-note-icon"><i class="bi bi-file-earmark-plus"></i></span>
                <span class="quick-note-text">
                    <strong>Note Kosong</strong>
                    <small>Langsung tulis tanpa isi form</small>
                </span>
            </button>
            <button class="quick-note-option" id="btnQuickForm">
                <span class="quick-note-icon"><i class="bi bi-ui-checks-grid"></i></span>
                <span class="quick-note-text">
                    <strong>Gunakan Form</strong>
                    <small>Isi judul, kategori, dan detail</small>
                </span>
            </button>
        </div>
    </div>
    <script type="module" src="js/pages/quickNote.js"></script>
</body>
</html>
