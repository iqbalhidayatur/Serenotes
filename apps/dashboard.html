<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>
        const t = localStorage.getItem("serenotes_theme") || "light";
        document.documentElement.setAttribute("data-theme", t);
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="style/app.css">
    <meta name="theme-color" content="#4F46E5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Serenotes">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="style/assets/icon-192.png">
    <link rel="icon" type="image/png" href="style/assets/icon-192.png">
</head>
<body>
    
    <header class="d-flex justify-content-between align-items-center border-bottom">

        <div class="d-flex align-items-center gap-3">

            <div>
                <h3 class="m-0">Home</h3>
                <p id="headerGreeting" class="m-0 text-secondary" style="font-size:.82rem;line-height:1.4;"></p>
            </div>

        </div>

        <a
            href="search.html"
            class="text-decoration-none"
        >

            <i class="bi bi-search fs-4"></i>

        </a>

    </header>

    <main class="p-2">

        <div class="recent pt-3 d-flex flex-row justify-content-space-between align-items-center w-100">
            <h1 class="w-100">Recent Notes</h1>
            <div class="filter d-flex justify-content-end align-items-center w-100 gap-2">
                <i class="bi bi-filter"></i>
                <i class="bi bi-app"></i>
            </div>
        </div>

        <div class="notes-card">

            <div
                id="notesContainer"
                class="card-container col p-3"
            >

            </div>

        </div>

        <button class="fab-btn" onclick="window.location.href='add-note.html'">
            <i class="bi bi-plus-lg"></i>
        </button>
    </main>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item active">
            <i class="bi bi-house-fill"></i>
        </a>

        <a href="hub.html" class="nav-item">
            <i class="bi bi-grid-fill"></i>
        </a>

        <a href="category.html" class="nav-item">
            <i class="bi bi-list-ul"></i>
        </a>
        
        <a href="settings.html" class="nav-item">
            <i class="bi bi-gear-fill"></i>
        </a>
    </nav>

    <script type="module" src="js/pages/dashboard.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>

</body>
</html>
