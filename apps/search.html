<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <script>
        const t = localStorage.getItem("serenotes_theme") || "light";
        document.documentElement.setAttribute("data-theme", t);
    </script>

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Search | Serenotes</title>

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com"
    >

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    >

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    >

    <link
        rel="stylesheet"
        href="style/app.css"
    >

    <meta name="theme-color" content="#4F46E5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Serenotes">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="style/assets/icon-192.png">
    <link rel="icon" type="image/png" href="style/assets/icon-192.png">
</head>

<body>

<header class="d-flex justify-content-between align-items-center border-bottom">

    <div class="d-flex align-items-center gap-3">

        <a
            href="dashboard.html"
            class="text-decoration-none text-dark"
        >

            <i class="bi bi-arrow-left fs-3"></i>

        </a>

        <h3 class="m-0">

            Search

        </h3>

    </div>

</header>

<main class="container py-4">

    <!-- Search -->

    <div class="search-box mb-4">

        <div class="search-input-wrapper">

            <i class="bi bi-search"></i>

            <input

                id="searchInput"

                type="text"

                placeholder="Search notes..."

                autocomplete="off"

            >

            <button

                id="clearInput"

                type="button"

            >

                <i class="bi bi-x-lg"></i>

            </button>

        </div>

    </div>

    <!-- Suggestions -->

    <section class="mb-4">

        <h6 class="section-title">

            Suggestions

        </h6>

        <div
            id="suggestionContainer"
            class="d-flex flex-wrap gap-2"
        >

            <button
                class="chip"
                data-keyword="Work"
            >

                Work

            </button>

            <button
                class="chip"
                data-keyword="Personal"
            >

                Personal

            </button>

            <button
                class="chip"
                data-keyword="Ideas"
            >

                Ideas

            </button>

            <button
                class="chip"
                data-keyword="Archive"
            >

                Archive

            </button>

        </div>

    </section>

    <!-- Recent Search -->

    <section class="mb-4">

        <div
            class="d-flex justify-content-between align-items-center mb-3"
        >

            <h6 class="section-title m-0">

                Recent Searches

            </h6>

            <button

                id="clearRecent"

                class="btn btn-link text-decoration-none p-0"

            >

                Clear

            </button>

        </div>

        <div id="recentSearch">

        </div>

    </section>

    <!-- Results -->

    <section>

        <h6 class="section-title mb-3">

            Results

        </h6>

        <div
            id="searchResult"
        >

            <div
                class="text-center py-5 text-secondary"
            >

                <i
                    class="bi bi-search"
                    style="font-size:3rem;"
                ></i>

                <p class="mt-3">

                    Start typing to search notes

                </p>

            </div>

        </div>

    </section>

</main>

<script
    type="module"
    src="js/pages/search.js"
></script>

<script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
></script>

</body>
</html>
