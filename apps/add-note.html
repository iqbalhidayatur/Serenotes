<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>
        const t = localStorage.getItem("serenotes_theme") || "light";
        document.documentElement.setAttribute("data-theme", t);
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Note | Serenotes</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="style/app.css">
    <meta name="theme-color" content="#4F46E5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Serenotes">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="style/assets/icon-192.png">
    <link rel="icon" type="image/png" href="style/assets/icon-192.png">
</head>
<body>

<header class="border-bottom d-flex justify-content-between align-items-center p-3">

    <div class="d-flex align-items-center gap-3">
        <a href="dashboard.html" class="text-dark text-decoration-none">
            <i class="bi bi-arrow-left fs-3"></i>
        </a>

        <h3 class="m-0 text-dark fw-semibold" id="pageTitle">
            Add Note
        </h3>
    </div>

    <button
        id="headerSaveBtn"
        type="submit"
        form="noteForm"
        class="btn btn-link"
    >
        Save
    </button>

</header>

<main class="container py-4">

    <form id="noteForm">

        <div class="mb-4">

            <label class="form-label">
                Category
            </label>

            <select
                id="category"
                class="form-select rounded-4 p-3"
            ></select>

            <input
                type="text"
                id="newCategory"
                class="form-control rounded-4 mt-2 d-none"
                placeholder="New category..."
            >

        </div>

        <div class="mb-4">

            <label class="form-label">
                Subcategory
            </label>

            <select
                id="subcategory"
                class="form-select rounded-4 p-3"
            ></select>

            <input
                type="text"
                id="newSubcategory"
                class="form-control rounded-4 mt-2 d-none"
                placeholder="New subcategory..."
            >

        </div>

        <div class="mb-4">

            <label class="form-label">
                Date
            </label>

            <input
                type="datetime-local"
                id="noteDate"
                class="form-control rounded-4 p-3"
            >

        </div>

        <div class="mb-4">

            <label class="form-label">
                Title
            </label>

            <input
                id="title"
                type="text"
                class="form-control rounded-4 p-3"
                placeholder="Title..."
            >

        </div>

        <div class="mb-4">

            <label class="form-label">
                Notes
            </label>

            <textarea
                id="content"
                class="form-control rounded-4 p-3"
                rows="8"
                placeholder="Write your note here..."
            ></textarea>

        </div>

        <div class="mb-4">

    <label class="form-label">
        Attachments
    </label>

    <label
        for="attachment"
        class="attachment-upload"
    >

        <i class="bi bi-paperclip"></i>

        <span>

            Add Photo, Video, GIF or Voice Note

        </span>

    </label>

    <input
        id="attachment"
        type="file"
        class="d-none"
        multiple
        accept="
            image/*,
            video/*,
            audio/*,
            .gif
        "
    >

    <div
        id="attachmentPreview"
        class="attachment-preview-list mt-3"
    ></div>

</div>

        <div class="mb-4">

            <div class="d-flex justify-content-between align-items-center">

                <div class="d-flex align-items-center gap-2">

                    <i class="bi bi-bell"></i>

                    <span>

                        Remind Me

                    </span>

                </div>

                <div class="form-check form-switch">

                    <input
                        id="reminderSwitch"
                        class="form-check-input"
                        type="checkbox"
                    >

                </div>

            </div>

        </div>

        <div
            id="reminderFields"
            class="d-none mb-4"
        >

            <label class="form-label">

                Reminder Date & Time

            </label>

            <input

                id="reminderDate"

                type="datetime-local"

                class="form-control rounded-4 p-3"

            >

        </div>

        <button
            id="bottomSaveBtn"
            type="submit"
            class="btn btn-primary w-100 rounded-4 py-3 fw-semibold"
        >
            Save Note
        </button>

    </form>

</main>

<script type="module" src="js/pages/add-note.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
