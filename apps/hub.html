<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>
        const t = localStorage.getItem("serenotes_theme") || "light";
        document.documentElement.setAttribute("data-theme", t);
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#4F46E5">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Hub | Serenotes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style/app.css">
</head>
<body>

<header>
    <div>
        <h3 class="m-0">Hub</h3>
        <p class="m-0 text-secondary" style="font-size:.82rem;">Your tools in one place</p>
    </div>
</header>

<main class="container py-4">

    <div class="hub-grid">

        <a href="board.html" class="hub-item">
            <div class="hub-icon" style="background:#ebe9ff; color:#4F46E5;">
                <i class="bi bi-kanban-fill"></i>
            </div>
            <div class="hub-info">
                <h5>Board</h5>
                <p>Kanban-style work tracking</p>
            </div>
            <i class="bi bi-chevron-right hub-arrow"></i>
        </a>

        <a href="calendar.html" class="hub-item">
            <div class="hub-icon" style="background:#d1fae5; color:#059669;">
                <i class="bi bi-calendar-fill"></i>
            </div>
            <div class="hub-info">
                <h5>Calendar</h5>
                <p>Browse notes by date</p>
            </div>
            <i class="bi bi-chevron-right hub-arrow"></i>
        </a>

        <a href="reminder.html" class="hub-item">
            <div class="hub-icon" style="background:#fef3c7; color:#d97706;">
                <i class="bi bi-bell-fill"></i>
            </div>
            <div class="hub-info">
                <h5>Reminders</h5>
                <p>Today, upcoming & overdue</p>
            </div>
            <i class="bi bi-chevron-right hub-arrow"></i>
        </a>

        <a href="search.html" class="hub-item">
            <div class="hub-icon" style="background:#fce7f3; color:#db2777;">
                <i class="bi bi-search"></i>
            </div>
            <div class="hub-info">
                <h5>Search</h5>
                <p>Find any note instantly</p>
            </div>
            <i class="bi bi-chevron-right hub-arrow"></i>
        </a>

    </div>

</main>

<nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item">
            <i class="bi bi-house-fill"></i>
        </a>

        <a href="hub.html" class="nav-item active">
            <i class="bi bi-grid-fill"></i>
        </a>

        <a href="add-note.html" class="nav-item add-note">
            <i class="bi bi-plus-circle-fill"></i>
        </a>

        <a href="category.html" class="nav-item">
            <i class="bi bi-list-ul"></i>
        </a>
        
        <a href="settings.html" class="nav-item">
            <i class="bi bi-gear-fill"></i>
        </a>
    </nav>

</body>
</html>
