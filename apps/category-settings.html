<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <script>
        const t = localStorage.getItem("serenotes_theme") || "light";
        document.documentElement.setAttribute("data-theme", t);
    </script>

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Category Settings | Serenotes
    </title>

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com"
    >

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    >

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    >

    <link
        rel="stylesheet"
        href="style/app.css"
    >

    <meta name="theme-color" content="#4F46E5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Serenotes">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="style/assets/icon-192.png">
    <link rel="icon" type="image/png" href="style/assets/icon-192.png">
</head>

<body>

<header class="border-bottom">

    <div class="container d-flex align-items-center gap-3">

        <a
            href="settings.html"
            class="text-decoration-none text-dark"
        >

            <i class="bi bi-arrow-left fs-4"></i>

        </a>

        <div>

            <h3 class="mb-1">

                Categories

            </h3>

            <p class="text-secondary">

                Manage categories & subcategories

            </p>

        </div>

    </div>

</header>

<main class="container py-4">

    <button
        id="addCategoryBtn"
        class="btn btn-primary w-100 rounded-4 mb-4"
    >

        <i class="bi bi-plus-lg"></i>

        Add Category

    </button>

    <div id="categoryList">

    </div>

</main>

<div
    class="modal fade"
    id="categoryModal"
    tabindex="-1"
>

    <div class="modal-dialog">

        <div class="modal-content rounded-4">

            <div class="modal-header">

                <h5>

                    New Category

                </h5>

            </div>

            <div class="modal-body">

                <input

                    id="categoryName"

                    class="form-control mb-3"

                    placeholder="Category name"

                >

                <input

                    id="subcategoryName"

                    class="form-control"

                    placeholder="First subcategory"

                >

            </div>

            <div class="modal-footer">

                <button
                    class="btn btn-secondary"
                    data-bs-dismiss="modal"
                >

                    Cancel

                </button>

                <button
                    id="saveCategoryBtn"
                    class="btn btn-primary"
                >

                    Save

                </button>

            </div>

        </div>

    </div>

</div>

<script
    type="module"
    src="js/pages/category-settings.js"
></script>

<script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
></script>

</body>

</html>
